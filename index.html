.view-note{font-size:10px;color:#555;margin-bottom:10px;padding:6px 10px;background:#fff;border-left:3px solid #7265E3;border-radius:0 4px 4px 0}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px;margin-bottom:14px}
.hcard{background:#2C2B2B;border-radius:6px;padding:10px 14px}
.hcard-lbl{font-size:9px;color:#A99DF0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.hcard-val{font-size:18px;font-weight:bold;color:#fff;line-height:1.1}
.hcard-sub{font-size:10px;margin-top:3px}
.pos{color:#16A34A}.neg{color:#DC2626}.neu{color:#D97706}.muted{color:#888}
.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:860px){.tables-row{grid-template-columns:1fr}}
.tblock{background:#fff;border:1px solid #e0ddf5;border-radius:6px;overflow:hidden}
.tblock-hdr{background:#2C2B2B;color:#A99DF0;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px;padding:7px 12px}
table{border-collapse:collapse;width:100%}
th{background:#7265E3;color:#fff;padding:6px 10px;text-align:right;font-size:10px;font-weight:bold;white-space:nowrap}

.pcard{background:#2C2B2B;border-radius:5px;padding:8px 12px}

const PERIODS = {
  jan26:{keys:['jan26'],yoy:['jan25'],label:'January 2026',plabel:'January 2025'},
  feb26:{keys:['feb26'],yoy:['feb25'],label:'February 2026',plabel:'February 2025'},
  mar26:{keys:['mar26'],yoy:['mar25'],label:'March 2026',plabel:'March 2025'},
  apr26:{keys:['apr26'],yoy:['apr25'],label:'April 2026',plabel:'April 2025'},
  q126:{keys:['jan26','feb26','mar26'],yoy:['jan25','feb25','mar25'],label:'Q1 2026',plabel:'Q1 2025'},
  ytd26:{keys:['jan26','feb26','mar26','apr26'],yoy:['jan25','feb25','mar25','apr25'],label:'YTD 2026 (Jan–Apr)',plabel:'YTD 2025 (Jan–Apr)'}
};

let curPeriod = 'jan26', curView = 'action', editMo = 'jan26';

function agg(keys, view) {
  let o = {leads:0,mqls:0,sqls:0,sals:0,cwd:0,mgp:0,commit_mgp:0,bestcase_mgp:0,beyond_mgp:0,bizdiscovery_mgp:0,goal_sqls:0,goal_sals:0,goal_cwd:0,goal_mgp:0,spend:0};
  keys.forEach(k => {
    let m = D[k][view];
    for (let f in o) { if (f !== 'spend') o[f] += (m[f] || 0); }
    o.spend += (SPEND[k] || 0);
  });
  return o;
}

function calc(m) {
  let c = {};
  c.lead_mql = m.leads > 0  ? m.mqls / m.leads  : null;
  c.mql_sql  = m.mqls  > 0  ? m.sqls / m.mqls   : null;
  c.sql_sal  = m.sqls  > 0  ? m.sals / m.sqls   : null;
  c.sal_cwd  = m.sals  > 0  ? m.cwd  / m.sals   : null;
  c.lead_cwd = m.leads > 0  ? m.cwd  / m.leads  : null;
  c.mql_cwd  = m.mqls  > 0  ? m.cwd  / m.mqls   : null;
  c.sql_cwd  = m.sqls  > 0  ? m.cwd  / m.sqls   : null;
  c.cpl    = m.leads > 0 ? m.spend / m.leads : null;
  c.cpmql  = m.mqls  > 0 ? m.spend / m.mqls  : null;
  c.cpsql  = m.sqls  > 0 ? m.spend / m.sqls  : null;
  c.cpsal  = m.sals  > 0 ? m.spend / m.sals  : null;
  c.cac    = m.cwd   > 0 ? m.spend / m.cwd   : null;
  c.aov    = m.cwd   > 0 ? m.mgp   / m.cwd   : null;
  c.tcv    = m.mgp * 8;
  c.ltv    = m.mgp * 12;
  c.tcv_lift = m.spend > 0 ? c.tcv / m.spend : null;
  c.ltv_lift = m.spend > 0 ? c.ltv / m.spend : null;
  c.forecast_mgp = (m.commit_mgp * 0.60) + (m.bestcase_mgp * 0.34) + (m.beyond_mgp * 0.2536) + (m.bizdiscovery_mgp * 0.1173);
  c.total_fcst_mgp = m.mgp + c.forecast_mgp;
  c.remaining_pipe = m.commit_mgp + m.bestcase_mgp + m.beyond_mgp + m.bizdiscovery_mgp;
  let avg_deal = m.cwd > 0 ? m.mgp / m.cwd : 12000;
  c.fcst_cwd = avg_deal > 0 ? c.forecast_mgp / avg_deal : 0;
  c.total_fcst_cwd = m.cwd + c.fcst_cwd;
  c.tcv_fcst = c.total_fcst_mgp * 8;
  c.ltv_fcst = c.total_fcst_mgp * 12;
  c.cac_fcst = c.total_fcst_cwd > 0 ? m.spend / c.total_fcst_cwd : null;
  c.tcv_lift_f = m.spend > 0 ? c.tcv_fcst / m.spend : null;
  c.ltv_lift_f = m.spend > 0 ? c.ltv_fcst / m.spend : null;
  return c;
}

function f$(v)  { return (v == null || isNaN(v)) ? '&mdash;' : '$' + Math.round(v).toLocaleString(); }
function fp(v)  { return (v == null || isNaN(v)) ? '&mdash;' : (v * 100).toFixed(1) + '%'; }
function fx(v)  { return (v == null || isNaN(v) || v === 0) ? '&mdash;' : v.toFixed(1) + 'x'; }
function fn(v)  { return (v == null || isNaN(v)) ? '&mdash;' : Math.round(v).toLocaleString(); }

function yoy(c, p) {
  if (p == null || p === 0) return { t: '&mdash;', cl: 'muted' };
  let pct = ((c - p) / p) * 100;
  return { t: (pct > 0 ? '+' : '') + pct.toFixed(0) + '%', cl: pct > 0 ? 'pos' : pct < 0 ? 'neg' : 'muted' };
}
function pog(a, g) {
  if (!g || g === 0) return { t: '&mdash;', cl: 'muted' };
  let p = (a / g) * 100;
  return { t: p.toFixed(0) + '%', cl: p >= 100 ? 'pos' : p >= 80 ? 'neu' : 'neg' };
}

// ── ROW BUILDERS (declared before render) ────────────────────────────────────
function heroCard(lbl, val, yoyObj, prior, costDir) {
  let cl = yoyObj.t === '&mdash;' ? 'muted'
         : costDir ? (yoyObj.cl === 'pos' ? 'neg' : yoyObj.cl === 'neg' ? 'pos' : yoyObj.cl)
         : yoyObj.cl;
  return `<div class="hcard"><div class="hcard-lbl">${lbl}</div><div class="hcard-val">${val}</div><div class="hcard-sub ${cl}">${yoyObj.t} YoY &nbsp;&middot;&nbsp; <span class="muted">Prior: ${prior}</span></div></div>`;
}
function volRow(lbl, cur, goal, prior, fmtFn, hiGood) {
  let p  = pog(cur, goal);
  let yy = yoy(cur, prior);
  let yc = yy.t === '&mdash;' ? 'muted' : (hiGood ? (cur >= prior ? 'pos' : 'neg') : (cur <= prior ? 'pos' : 'neg'));
  return `<tr><td>${lbl}</td><td>${fmtFn(cur)}</td><td>${goal ? fmtFn(goal) : '&mdash;'}</td><td class="${p.cl}">${p.t}</td><td>${fmtFn(prior)}</td><td class="${yc}">${yy.t}</td></tr>`;
}
function rateRow(lbl, cur, prior) {
  let yy = yoy(cur, prior);
  let yc = yy.t === '&mdash;' ? 'muted' : (cur >= prior ? 'pos' : 'neg');
  return `<tr><td>${lbl}</td><td>${fp(cur)}</td><td>&mdash;</td><td>&mdash;</td><td>${fp(prior)}</td><td class="${yc}">${yy.t}</td></tr>`;
}
function costRow(lbl, cur, prior) {
  let yy = yoy(cur, prior);
  let yc = yy.t === '&mdash;' ? 'muted' : (cur <= prior ? 'pos' : 'neg');
  return `<tr><td>${lbl}</td><td>${f$(cur)}</td><td>${f$(prior)}</td><td class="${yc}">${yy.t}</td></tr>`;
}
function effRow(lbl, cv, pv, yoyObj, hiGood) {
  let yc = yoyObj.t === '&mdash;' ? 'muted' : (hiGood ? yoyObj.cl : (yoyObj.cl === 'pos' ? 'neg' : 'pos'));
  return `<tr><td>${lbl}</td><td>${cv}</td><td>${pv}</td><td class="${yc}">${yoyObj.t}</td></tr>`;
}

  }</div>`;

  h += `<div class="hero-grid">

  </div>`;

  h += `<div class="tables-row">`;

  // LEFT — Volume + Rates
  h += `<div class="tblock">
    <div class="tblock-hdr">Funnel Volume &mdash; vs. Goal &amp; YoY</div>

      <th>Metric</th><th>${pd.label}</th><th>Goal</th><th>% Goal</th><th>${pd.plabel}</th><th>YoY</th>
    </tr></thead><tbody>
    <tr class="sec-row"><td colspan="6">Volume</td></tr>

    ${rateRow('Lead &rarr; MQL',        c.lead_mql, cp.lead_mql)}

    ${rateRow('SQL &rarr; SAL',         c.sql_sal,  cp.sql_sal)}
    ${rateRow('SAL &rarr; Closed Won',  c.sal_cwd,  cp.sal_cwd)}
    ${rateRow('Lead &rarr; Closed Won', c.lead_cwd, cp.lead_cwd)}
    ${rateRow('MQL &rarr; Closed Won',  c.mql_cwd,  cp.mql_cwd)}
    ${rateRow('SQL &rarr; Closed Won',  c.sql_cwd,  cp.sql_cwd)}
    </tbody></table>
  </div>`;

  // RIGHT — Costs + TCV/LTV/CAC
  h += `<div class="tblock">
    <div class="tblock-hdr">Efficiency &mdash; Cost, TCV / LTV / CAC</div>
    <table><thead><tr>
      <th>Metric</th><th>${pd.label}</th><th>${pd.plabel}</th><th>YoY</th>
    </tr></thead><tbody>
    <tr class="sec-row"><td colspan="4">Cost Per Stage</td></tr>
    ${costRow('Cost per Lead',    c.cpl,   cp.cpl)}

    ${costRow('Cost per SAL',     c.cpsal, cp.cpsal)}
    ${costRow('CAC (Actual)',     c.cac,   cp.cac)}
    <tr class="sec-row"><td colspan="4">TCV / LTV / CAC &mdash; Closed Won</td></tr>
    ${effRow('AOV',      f$(c.aov),      f$(cp.aov),      yoy(c.aov,      cp.aov),      true)}
    ${effRow('TCV',      f$(c.tcv),      f$(cp.tcv),      yoy(c.tcv,      cp.tcv),      true)}
    ${effRow('LTV',      f$(c.ltv),      f$(cp.ltv),      yoy(c.ltv,      cp.ltv),      true)}

    ${effRow('TCV Lift', fx(c.tcv_lift), fx(cp.tcv_lift), yoy(c.tcv_lift, cp.tcv_lift), true)}

  h += `</div>`; // close tables-row

  // Pipeline detail
  h += `<div class="pipe-block">
    <h3>Open Pipeline &amp; Forecast Breakdown &mdash; ${pd.label}</h3>

    <div class="msec">Action Date &mdash; Goals</div>
    <div><label>Goal SQLs</label><input type="number" id="ef_a_gs" value="${m.action.goal_sqls}"></div>
    <div><label>Goal SALs</label><input type="number" id="ef_a_ga" value="${m.action.goal_sals}"></div>
    <div><label>Goal Closed Won</label><input type="number" id="ef_a_gc" value="${m.action.goal_cwd}"></div>
    <div><label>Goal MGP ($)</label><input type="number" id="ef_a_gm" value="${m.action.goal_mgp}"></div>
    <div class="msec">Created Date (Cohort) &mdash; SQLs / SALs / CW / MGP</div>
    <div style="grid-column:1/-1;font-size:10px;color:#888;margin-bottom:4px">Leads &amp; MQLs shared from Action. Enter downstream cohort values: of SQLs created this month, how many eventually became SALs, Closed Won, and what was the total MGP?</div>
    <div><label>SQLs (by create date)</label><input type="number" id="ef_cs" value="${m.created.sqls}"></div>
    <div><label>SALs (from this cohort)</label><input type="number" id="ef_ca" value="${m.created.sals}"></div>
    <div><label>Closed Won (from cohort)</label><input type="number" id="ef_cc" value="${m.created.cwd}"></div>
    <div><label>MGP from cohort ($)</label><input type="number" id="ef_cg" value="${m.created.mgp}"></div>
    <div class="msec">Created Date &mdash; Open Pipeline (MGP $)</div>
    <div><label>Commit MGP</label><input type="number" id="ef_c_cm" value="${m.created.commit_mgp}"></div>
    <div><label>Best Case MGP</label><input type="number" id="ef_c_bc" value="${m.created.bestcase_mgp}"></div>
    <div><label>Beyond BD MGP</label><input type="number" id="ef_c_bb" value="${m.created.beyond_mgp}"></div>
    <div><label>Biz Discovery MGP</label><input type="number" id="ef_c_bd" value="${m.created.bizdiscovery_mgp}"></div>
  </div>`;
}

function saveEdit() {
  let k = editMo;
  let g = id => parseFloat(document.getElementById(id)?.value) || 0;
  SPEND[k] = g('ef_sp');
  D[k].action = {
    leads:g('ef_al'), mqls:g('ef_am'), sqls:g('ef_as'), sals:g('ef_aa'), cwd:g('ef_ac'), mgp:g('ef_ag'),
    commit_mgp:g('ef_a_cm'), bestcase_mgp:g('ef_a_bc'), beyond_mgp:g('ef_a_bb'), bizdiscovery_mgp:g('ef_a_bd'),
    goal_sqls:g('ef_a_gs'), goal_sals:g('ef_a_ga'), goal_cwd:g('ef_a_gc'), goal_mgp:g('ef_a_gm')
  };
  D[k].created = {
    leads:g('ef_al'), mqls:g('ef_am'),
    sqls:g('ef_cs'), sals:g('ef_ca'), cwd:g('ef_cc'), mgp:g('ef_cg'),
    commit_mgp:g('ef_c_cm'), bestcase_mgp:g('ef_c_bc'), beyond_mgp:g('ef_c_bb'), bizdiscovery_mgp:g('ef_c_bd'),
    goal_sqls:g('ef_a_gs'), goal_sals:g('ef_a_ga'), goal_cwd:g('ef_a_gc'), goal_mgp:g('ef_a_gm')
  };
  closeEdit();
  render();
}

render();
</script>
</body>
</html>
